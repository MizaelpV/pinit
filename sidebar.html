<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinIt</title>
  <link rel="stylesheet" href="styles/sidebar.css" />
</head>
<body>
  <header class="sidebar-header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"
         stroke-linejoin="round" style="flex-shrink:0">
      <line x1="12" y1="17" x2="12" y2="22"/>
      <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>
    </svg>
    <h1 class="sidebar-title">PinIt</h1>
    <span class="sidebar-count" id="pin-count"></span>
  </header>

  <main id="pin-list" class="pin-list"></main>

  <div id="empty-state" class="empty-state" hidden>
    <p class="empty-text">No pins yet — click
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
           stroke-linejoin="round" style="display:inline;vertical-align:middle;position:relative;top:-1px">
        <line x1="12" y1="17" x2="12" y2="22"/>
        <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>
      </svg>
      next to any response to save it.
    </p>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
